<!-- Tarjeta de perfil -->
<div class="profile-card">
  <div class="profile-name" id="alumno-nombre">Cargando…</div>
  <div class="profile-sub" id="alumno-oferta">&nbsp;</div>
  <div class="profile-chips">
    <span class="chip" id="alumno-matricula-chip">
      <i class="bi bi-person-badge-fill"></i> —
    </span>
    <span class="chip" id="alumno-estatus-chip">
      <i class="bi bi-circle-fill" style="font-size: 0.5rem"></i> —
    </span>
  </div>
</div>

<!-- Tarjetas de resumen -->
<div class="summary-grid">
  <div class="summary-card">
    <div class="summary-card__label">
      <i class="bi bi-wallet2"></i> Saldo actual
    </div>
    <div class="summary-card__value" id="card-saldo">—</div>
  </div>
  <div class="summary-card">
    <div class="summary-card__label">
      <i class="bi bi-shield-check"></i> Estatus
    </div>
    <div class="summary-card__value">
      <span class="status-badge" id="card-estatus">—</span>
    </div>
  </div>
  <div class="summary-card">
    <div class="summary-card__label">
      <i class="bi bi-calendar3"></i> Semestre activo
    </div>
    <div class="summary-card__value" id="card-semestre">—</div>
  </div>
</div>
