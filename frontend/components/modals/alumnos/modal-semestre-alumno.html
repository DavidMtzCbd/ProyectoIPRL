<!-- Modal: Gestión de semestre del alumno -->
<div id="modal-semestre-alumno" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="semestre-modal-title">Registrar semestre</h3>
      <button class="modal-close" data-close="modal-semestre-alumno">✕</button>
    </div>
    <form id="form-semestre-alumno">
      <input type="hidden" id="s-id" />
      <input type="hidden" id="s-alumno-id" />
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label for="s-num">Número de semestre</label>
            <input
              id="s-num"
              type="number"
              min="1"
              required
              placeholder="Ej. 1"
            />
          </div>
          <div class="form-group">
            <label for="s-periodo">Periodo</label>
            <input
              id="s-periodo"
              type="text"
              required
              placeholder="Ej. 2024-A"
            />
          </div>
          <div class="form-group">
            <label for="s-inscripcion">Inscripción base ($)</label>
            <input
              id="s-inscripcion"
              type="number"
              min="0"
              step="0.01"
              required
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="s-reinscripcion">Reinscripción base ($)</label>
            <input
              id="s-reinscripcion"
              type="number"
              min="0"
              step="0.01"
              required
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="s-colegiatura">Colegiatura mensual ($)</label>
            <input
              id="s-colegiatura"
              type="number"
              min="0"
              step="0.01"
              required
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="s-beca">% de beca (0 si no aplica)</label>
            <input
              id="s-beca"
              type="number"
              min="0"
              max="100"
              step="0.01"
              required
              placeholder="0"
            />
          </div>
        </div>
        <!-- Preview de precios con beca -->
        <div
          id="semestre-preview"
          style="
            margin-top: 14px;
            padding: 12px 14px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 9px;
            display: none;
          "
        >
          <p
            style="
              font-size: 0.8rem;
              font-weight: 700;
              color: #15803d;
              margin-bottom: 8px;
            "
          >
            <i class="bi bi-stars"></i> Vista previa con beca aplicada
          </p>
          <div
            style="
              display: flex;
              gap: 16px;
              flex-wrap: wrap;
              font-size: 0.85rem;
            "
          >
            <span>Inscripción: <strong id="prev-insc">—</strong></span>
            <span>Reinscripción: <strong id="prev-reinsc">—</strong></span>
            <span>Colegiatura: <strong id="prev-cole">—</strong></span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn-sm btn-secondary"
          data-close="modal-semestre-alumno"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="btn-sm btn-success"
          id="semestre-submit-btn"
        >
          <i class="bi bi-floppy-fill"></i> Guardar semestre
        </button>
      </div>
    </form>
  </div>
</div>
