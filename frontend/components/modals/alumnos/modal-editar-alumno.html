<!-- Modal: Editar alumno -->
<div id="modal-editar-alumno" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3>Editar alumno</h3>
      <button class="modal-close" data-close="modal-editar-alumno">✕</button>
    </div>
    <form id="form-editar-alumno">
      <div class="modal-body">
        <!-- Info de solo lectura -->
        <p
          id="edit-alumno-nombre"
          style="
            margin: 0 0 18px;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text);
          "
        ></p>
        <div class="form-grid">
          <div class="form-group">
            <label for="edit-estatus">Estatus</label>
            <select id="edit-estatus" required>
              <option value="Al corriente">Al corriente</option>
              <option value="Adeudo">Adeudo</option>
              <option value="Convenio">Convenio</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-saldo">Saldo actual ($)</label>
            <input
              id="edit-saldo"
              type="number"
              step="0.01"
              min="0"
              placeholder="0.00"
              required
            />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn-sm btn-secondary"
          data-close="modal-editar-alumno"
        >
          Cancelar
        </button>
        <button type="submit" class="btn-sm btn-primary">
          Guardar cambios
        </button>
      </div>
    </form>
  </div>
</div>
