<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Permite que Google Sign-In use postMessage correctamente -->
    <meta
      http-equiv="Cross-Origin-Opener-Policy"
      content="same-origin-allow-popups"
    />
    <title>Acceso al Sistema | IPRL</title>
    <link rel="stylesheet" href="./Shared/styles/login.css" />
    <!-- Google Identity Services — se carga antes que el módulo JS -->
    <script src="https://accounts.google.com/gsi/client"></script>
  </head>
  <body>
    <div class="login-container">
      <div class="login-form">
        <!-- Logo / Encabezado -->
        <div class="login-logo">
          <div class="login-logo__circle">
            <span>IP</span>
          </div>
        </div>
        <h2 class="login-title">IPRL</h2>
        <p class="login-subtitle">Control escolar y financiero</p>

        <!-- Mensaje de error -->
        <div id="login-error" class="login-error" style="display: none"></div>
        <div id="login-loading" class="login-loading" style="display: none">
          <div class="login-spinner"></div>
          <span>Verificando identidad…</span>
        </div>

        <!-- Botón oficial de Google -->
        <div
          id="g_id_onload"
          data-client_id="1020740142848-eul33db5tnionjki0933cgkttuipl4hj.apps.googleusercontent.com"
          data-callback="handleGoogleCredential"
          data-auto_prompt="false"
        ></div>

        <div class="google-btn-wrapper">
          <div
            class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="outline"
            data-text="signin_with"
            data-shape="rectangular"
            data-logo_alignment="left"
            data-width="280"
          ></div>
        </div>

        <p class="login-hint">
          Solo pueden acceder las cuentas registradas en el sistema.
        </p>
      </div>
    </div>

    <script type="module" src="./Shared/js/login.js"></script>
  </body>
</html>
