<!-- Modal: Gestión de cuatrimestre del alumno -->
<div id="modal-cuatrimestre-alumno" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="cuatrimestre-modal-title">Registrar cuatrimestre</h3>
      <button class="modal-close" data-close="modal-cuatrimestre-alumno">✕</button>
    </div>
    <form id="form-cuatrimestre-alumno">
      <input type="hidden" id="c-id" />
      <input type="hidden" id="c-alumno-id" />
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label for="c-num">Número de cuatrimestre</label>
            <input
              id="c-num"
              type="number"
              min="1"
              required
              placeholder="Ej. 1"
            />
            <label class="c-recurso-label">
              <input type="checkbox" id="c-recurso" class="c-recurso-check" />
              Es repetidor
              <span class="c-recurso-hint">(recurso del mismo cuatrimestre)</span>
            </label>
          </div>
          <div class="form-group">
            <label>Periodo</label>
            <div class="periodo-row">
              <div class="periodo-sub-group">
                <span class="periodo-sublabel">Año</span>
                <input
                  id="c-anio"
                  type="number"
                  min="2000"
                  max="2100"
                  required
                  placeholder="2026"
                  class="c-anio-input"
                />
              </div>
              <div class="periodo-sub-group">
                <span class="periodo-sublabel">Meses</span>
                <select id="c-meses" required class="c-meses-select">
                  <option value="" disabled selected>
                    Seleccionar período
                  </option>
                  <option value="Enero-Abril">Enero – Abril</option>
                  <option value="Mayo-Agosto">Mayo – Agosto</option>
                  <option value="Septiembre-Diciembre">Septiembre – Diciembre</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Inscripción: solo visible en Cuatrimestre 1 -->
          <div class="form-group" id="c-inscripcion-group">
            <label for="c-inscripcion">Inscripción base ($)</label>
            <input
              id="c-inscripcion"
              type="number"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="c-reinscripcion">Reinscripción base ($)</label>
            <input
              id="c-reinscripcion"
              type="number"
              min="0"
              step="0.01"
              required
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="c-colegiatura">Colegiatura mensual ($)</label>
            <input
              id="c-colegiatura"
              type="number"
              min="0"
              step="0.01"
              required
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="c-beca">% de beca (0 si no aplica)</label>
            <input
              id="c-beca"
              type="number"
              min="0"
              max="100"
              step="0.01"
              required
              placeholder="0"
            />
          </div>
          <!-- Selector de estatus: solo visible en modo edición -->
          <div class="form-group" id="c-estatus-group" style="display:none">
            <label for="c-estatus">Estatus del cuatrimestre</label>
            <select id="c-estatus">
              <option value="En curso">En curso</option>
              <option value="Finalizado">Finalizado</option>
            </select>
          </div>
        </div>
        <!-- Aviso cuando el cuatrimestre está finalizado -->
        <div id="c-finalizado-notice" class="s-finalizado-notice" style="display:none">
          <i class="bi bi-lock-fill"></i> Este cuatrimestre ya finalizó y no puede modificarse.
        </div>
        <!-- Preview de beca: solo aplica a colegiatura -->
        <div id="cuatrimestre-preview" class="semestre-preview">
          <p class="semestre-preview__title">
            <i class="bi bi-stars"></i> Beca aplicada a colegiatura
          </p>
          <div class="semestre-preview__values">
            <span>Colegiatura con beca: <strong id="prev-c-cole">—</strong></span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn-sm btn-secondary"
          data-close="modal-cuatrimestre-alumno"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="btn-sm btn-success"
          id="cuatrimestre-submit-btn"
        >
          <i class="bi bi-floppy-fill"></i> Guardar cuatrimestre
        </button>
      </div>
    </form>
  </div>
</div>
