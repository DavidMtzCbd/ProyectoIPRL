<!-- Modal: Registrar Titulación -->
<div id="modal-titulacion-alumno" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3>Registrar Titulación</h3>
      <button type="button" class="modal-close" data-close="modal-titulacion-alumno">✕</button>
    </div>
    <form id="form-titulacion-alumno">
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group full-width">
            <label for="t-certificado">Costo del Certificado</label>
            <input
              id="t-certificado"
              type="number"
              step="0.01"
              required
              placeholder="Ej. 1500.00"
            />
          </div>
          <div class="form-group full-width">
            <label for="t-titulacion">Costo de la Titulación</label>
            <input
              id="t-titulacion"
              type="number"
              step="0.01"
              required
              placeholder="Ej. 3500.00"
            />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn-sm btn-secondary"
          data-close="modal-titulacion-alumno"
        >
          Cancelar
        </button>
        <button type="submit" class="btn-sm btn-success">Guardar</button>
      </div>
    </form>
  </div>
</div>
