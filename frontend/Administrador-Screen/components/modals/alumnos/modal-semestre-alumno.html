<!-- Modal: Gestión de semestre del alumno -->
<div id="modal-semestre-alumno" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="semestre-modal-title">Registrar semestre</h3>
      <button class="modal-close" data-close="modal-semestre-alumno">✕</button>
    </div>
    <form id="form-semestre-alumno">
      <input type="hidden" id="s-id" />
      <input type="hidden" id="s-alumno-id" />
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label for="s-num">Número de semestre</label>
            <input
              id="s-num"
              type="number"
              min="1"
              required
              placeholder="Ej. 1"
            />
            <label class="s-recurso-label">
              <input type="checkbox" id="s-recurso" class="s-recurso-check" />
              Es repetidor
              <span class="s-recurso-hint">(recurso del mismo semestre)</span>
            </label>
          </div>
          <div class="form-group">
            <label>Periodo</label>
            <div class="periodo-row">
              <div class="periodo-sub-group">
                <span class="periodo-sublabel">Año</span>
                <input
                  id="s-anio"
                  type="number"
                  min="2000"
                  max="2100"
                  required
                  placeholder="2026"
                  class="s-anio-input"
                />
              </div>
              <div class="periodo-sub-group">
                <span class="periodo-sublabel">Meses</span>
                <select id="s-meses" required class="s-meses-select">
                  <option value="" disabled selected>
                    Seleccionar período
                  </option>
                  <option value="Febrero-Julio">Febrero – Julio</option>
                  <option value="Agosto-Enero">Agosto – Enero</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Inscripción: solo visible en Semestre 1 -->
          <div class="form-group" id="s-inscripcion-group">
            <label for="s-inscripcion">Inscripción base ($)</label>
            <input
              id="s-inscripcion"
              type="number"
              min="0"
              step="0.01"
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="s-reinscripcion">Reinscripción base ($)</label>
            <input
              id="s-reinscripcion"
              type="number"
              min="0"
              step="0.01"
              required
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="s-colegiatura">Colegiatura mensual ($)</label>
            <input
              id="s-colegiatura"
              type="number"
              min="0"
              step="0.01"
              required
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="s-beca">% de beca (0 si no aplica)</label>
            <input
              id="s-beca"
              type="number"
              min="0"
              max="100"
              step="0.01"
              required
              placeholder="0"
            />
          </div>
          <!-- Selector de estatus: solo visible en modo edición -->
          <div class="form-group" id="s-estatus-group" style="display:none">
            <label for="s-estatus">Estatus del semestre</label>
            <select id="s-estatus">
              <option value="En curso">En curso</option>
              <option value="Finalizado">Finalizado</option>
            </select>
          </div>
        </div>
        <!-- Aviso cuando el semestre está finalizado -->
        <div id="s-finalizado-notice" class="s-finalizado-notice" style="display:none">
          <i class="bi bi-lock-fill"></i> Este semestre ya finalizó y no puede modificarse.
        </div>
        <!-- Preview de beca: solo aplica a colegiatura -->
        <div id="semestre-preview" class="semestre-preview">
          <p class="semestre-preview__title">
            <i class="bi bi-stars"></i> Beca aplicada a colegiatura
          </p>
          <div class="semestre-preview__values">
            <span>Colegiatura con beca: <strong id="prev-cole">—</strong></span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn-sm btn-secondary"
          data-close="modal-semestre-alumno"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="btn-sm btn-success"
          id="semestre-submit-btn"
        >
          <i class="bi bi-floppy-fill"></i> Guardar semestre
        </button>
      </div>
    </form>
  </div>
</div>
