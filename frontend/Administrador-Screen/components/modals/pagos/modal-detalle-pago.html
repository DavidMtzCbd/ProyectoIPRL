<!-- Modal: Detalle de pago -->
<div id="modal-detalle-pago" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3>Detalle del pago</h3>
      <button class="modal-close" data-close="modal-detalle-pago">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="pago-info-grid">
        <div class="detail-item">
          <span>Movimiento</span>
          <span id="dp-movimiento">—</span>
        </div>

        <div class="detail-item">
          <span>Folio Factura</span>
          <span id="dp-folio">—</span>
        </div>

        <div class="detail-item">
          <span>Fecha de pago</span>
          <span id="dp-fecha">—</span>
        </div>

        <div class="detail-item">
          <span>Monto</span>
          <span id="dp-monto">—</span>
        </div>

        <div class="detail-item">
          <span>Concepto</span>
          <span id="dp-concepto">—</span>
        </div>

        <div class="detail-item">
          <span>Método de pago</span>
          <span id="dp-metodo">—</span>
        </div>

        <div class="detail-item">
          <span>Alumno</span>
          <span id="dp-alumno">—</span>
        </div>

        <div class="detail-item">
          <span>Matrícula</span>
          <span id="dp-matricula">—</span>
        </div>

        <div class="detail-item">
          <span>Referencia</span>
          <span id="dp-referencia">—</span>
        </div>

        <div class="detail-item">
          <span>Factura</span>
          <span id="dp-factura">—</span>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button
        type="button"
        class="btn-sm btn-secondary"
        data-close="modal-detalle-pago"
      >
        Cerrar
      </button>
    </div>
  </div>
</div>
