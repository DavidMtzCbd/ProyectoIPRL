<!-- Modal: Registrar pago -->
<div id="modal-registrar-pago" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3>Registrar nuevo pago</h3>
      <button class="modal-close" data-close="modal-registrar-pago">✕</button>
    </div>
    <form id="form-registrar-pago">
      <div class="modal-body">
        <div class="form-grid">
          <!-- Buscador por nombre (autocomplete) -->
          <div class="form-group full-width autocomplete-group">
            <label for="p-buscar-nombre">Buscar alumno por nombre</label>
            <div class="autocomplete-wrapper">
              <i class="bi bi-person-search autocomplete-icon"></i>
              <input
                id="p-buscar-nombre"
                type="text"
                class="autocomplete-input"
                placeholder="Escribe el nombre del alumno…"
                autocomplete="off"
              />
            </div>
            <ul id="p-sugerencias" class="autocomplete-list" hidden></ul>
          </div>

          <!-- Matrícula (se autocompleta al seleccionar) -->
          <div class="form-group full-width">
            <label for="p-matricula">Matrícula del alumno</label>
            <input
              id="p-matricula"
              type="text"
              required
              placeholder="Ingresa la matrícula"
            />
            <div id="alumno-preview"></div>
          </div>
          <div class="form-group">
            <label for="p-fecha">Fecha de pago</label>
            <input id="p-fecha" type="date" required />
          </div>
          <div class="form-group">
            <label for="p-monto">Monto ($)</label>
            <input
              id="p-monto"
              type="number"
              min="0"
              step="0.01"
              required
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="p-metodo">Método de pago</label>
            <select id="p-metodo" required>
              <option value="">-- Seleccionar --</option>
              <option value="Deposito en efectivo">Depósito en efectivo</option>
              <option value="Transferencia">Transferencia</option>
            </select>
          </div>
          <div class="form-group" id="group-semestre-destino" style="display: none;">
            <label for="p-semestre-destino">Aplicar a semestre</label>
            <select id="p-semestre-destino">
              <option value="">Automático (Mes / Semestre más antiguo)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="p-concepto">Concepto</label>
            <select id="p-concepto" required>
              <option value="">-- Seleccionar --</option>
              <option value="Inscripción">Inscripción</option>
              <option value="Reinscripción">Reinscripción</option>
              <option value="Ingeniería Colegiatura">
                Ingeniería Colegiatura
              </option>
              <option value="Extraordinarios">Extraordinarios</option>
              <option value="Maestría Colegiatura">Maestría Colegiatura</option>
              <option value="Titulación">Titulación</option>
              <option value="Certificados">Certificados</option>
              <option value="Recuperación de cartera">
                Recuperación de cartera
              </option>
              <option value="Hergonomia colegiatura">
                Hergonomia colegiatura
              </option>
              <option value="Diplomado">Diplomado</option>
              <option value="Curso">Curso</option>
            </select>
          </div>
          <div class="form-group">
            <label for="p-referencia"> Referencia (auto-generada) </label>
            <input id="p-referencia" type="text" placeholder="R-000000" />
          </div>
          <div class="form-group">
            <label for="p-factura">¿Requiere factura?</label>
            <select id="p-factura">
              <option value="No">No</option>
              <option value="Sí">Sí</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn-sm btn-secondary modal-btn-cancel"
          data-close="modal-registrar-pago"
        >
          <i class="bi bi-x-lg"></i> Cancelar
        </button>
        <button type="submit" class="btn-sm btn-success modal-btn-save">
          <i class="bi bi-floppy-fill"></i> Guardar pago
        </button>
      </div>
    </form>
  </div>
</div>
