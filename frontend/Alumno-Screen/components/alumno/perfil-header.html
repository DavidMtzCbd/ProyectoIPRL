<!-- Tarjeta de perfil -->
<div class="profile-card">
  <div class="profile-name" id="alumno-nombre">Cargando…</div>
  <div class="profile-sub" id="alumno-oferta">&nbsp;</div>
  <div class="profile-chips">
    <span class="chip" id="alumno-matricula-chip">
      <i class="bi bi-person-badge-fill"></i> <span id="alumno-matricula-text">—</span>
    </span>
    <span class="chip" id="alumno-estatus-chip">
      <i class="bi bi-circle-fill" style="font-size: 0.5rem"></i> <span id="alumno-estatus-text">—</span>
    </span>
  </div>
</div>

<!-- Tarjeta Hero de Saldo Actual -->
<div class="saldo-hero">
  <div class="saldo-hero__left">
    <div class="saldo-hero__label">
      <i class="bi bi-wallet2"></i> Saldo Actual
    </div>
    <div class="saldo-hero__amount" id="card-saldo">—</div>
    <div class="saldo-hero__note" id="saldo-nota">
      Actualizado al momento de tu sesión
    </div>
  </div>
  <div class="saldo-hero__right">
    <span class="status-badge" id="card-estatus"><i class="bi bi-circle-fill" style="font-size: 0.5rem"></i> <span id="card-estatus-text">—</span></span>
  </div>
</div>

<!-- Grid secundario: Semestre activo -->
<div class="summary-grid">
  <div class="summary-card">
    <div class="summary-card__label">
      <i class="bi bi-calendar3"></i> Semestre activo
    </div>
    <div class="summary-card__value" id="card-semestre">—</div>
  </div>
  <div class="summary-card">
    <div class="summary-card__label">
      <i class="bi bi-mortarboard-fill"></i> Oferta educativa
    </div>
    <div
      class="summary-card__value"
      id="card-oferta"
      style="font-size: 0.95rem; font-weight: 600"
    >
      —
    </div>
  </div>
</div>
