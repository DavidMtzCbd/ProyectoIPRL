<section class="view active">
  <article class="table-card">
    <div class="view-header">
      <h3>Pagos registrados</h3>
      <button id="btn-registrar-pago" class="btn-sm btn-success">
        <i class="bi bi-plus-circle-fill"></i> Registrar pago
      </button>
    </div>

    <!-- Buscador por nombre o matrícula -->
    <form id="pagos-filter-form" class="search-bar-form">
      <div class="search-input-wrapper">
        <i class="bi bi-search search-icon"></i>
        <input
          id="alumno-id"
          type="text"
          class="search-input"
          placeholder="Buscar por nombre o matrícula del alumno…"
          autocomplete="off"
        />
      </div>
      <button type="submit" class="btn-sm btn-action">
        <i class="bi bi-search"></i> Buscar
      </button>
      <button type="button" id="btn-limpiar-filtro" class="btn-sm btn-clear">
        <i class="bi bi-x-circle-fill"></i> Limpiar
      </button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Mov.</th>
          <th>Folio Factura</th>
          <th>Fecha</th>
          <th>Matrícula</th>
          <th>Nombre</th>
          <th>Concepto</th>
          <th>Monto</th>
          <th>Método</th>
          <th>Referencia</th>
          <th>Factura</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="pagos-table"></tbody>
    </table>
    <div id="pagos-pagination"></div>
  </article>
</section>

<!-- Modal: Registrar pago -->
<div id="modal-registrar-pago" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3>Registrar nuevo pago</h3>
      <button class="modal-close" data-close="modal-registrar-pago">✕</button>
    </div>
    <form id="form-registrar-pago">
      <div class="modal-body">
        <div class="form-grid">
          <!-- Buscador por nombre (autocomplete) -->
          <div class="form-group full-width autocomplete-group">
            <label for="p-buscar-nombre">Buscar alumno por nombre</label>
            <div class="autocomplete-wrapper">
              <i class="bi bi-person-search autocomplete-icon"></i>
              <input
                id="p-buscar-nombre"
                type="text"
                class="autocomplete-input"
                placeholder="Escribe el nombre del alumno…"
                autocomplete="off"
              />
            </div>
            <ul id="p-sugerencias" class="autocomplete-list" hidden></ul>
          </div>

          <!-- Matrícula (se autocompleta al seleccionar) -->
          <div class="form-group full-width">
            <label for="p-matricula">Matrícula del alumno</label>
            <input
              id="p-matricula"
              type="text"
              required
              placeholder="Ingresa la matrícula"
            />
            <div id="alumno-preview"></div>
          </div>
          <div class="form-group">
            <label for="p-fecha">Fecha de pago</label>
            <input id="p-fecha" type="date" required />
          </div>
          <div class="form-group">
            <label for="p-monto">Monto ($)</label>
            <input
              id="p-monto"
              type="number"
              min="0"
              step="0.01"
              required
              placeholder="0.00"
            />
          </div>
          <div class="form-group">
            <label for="p-metodo">Método de pago</label>
            <select id="p-metodo" required>
              <option value="">-- Seleccionar --</option>
              <option value="Deposito en efectivo">Depósito en efectivo</option>
              <option value="Transferencia">Transferencia</option>
            </select>
          </div>
          <div class="form-group">
            <label for="p-concepto">Concepto</label>
            <select id="p-concepto" required>
              <option value="">-- Seleccionar --</option>
              <option value="Inscripción">Inscripción</option>
              <option value="Reinscripción">Reinscripción</option>
              <option value="Ingeniería Colegiatura">
                Ingeniería Colegiatura
              </option>
              <option value="Extraordinarios">Extraordinarios</option>
              <option value="Maestría Colegiatura">Maestría Colegiatura</option>
              <option value="Titulación">Titulación</option>
              <option value="Certificados">Certificados</option>
              <option value="Recuperación de cartera">
                Recuperación de cartera
              </option>
              <option value="Hergonomia colegiatura">
                Hergonomia colegiatura
              </option>
              <option value="Diplomado">Diplomado</option>
              <option value="Curso">Curso</option>
            </select>
          </div>
          <div class="form-group">
            <label for="p-referencia">Referencia</label>
            <input id="p-referencia" type="text" placeholder="R.000000" />
          </div>
          <div class="form-group">
            <label for="p-factura">¿Requiere factura?</label>
            <select id="p-factura">
              <option value="No">No</option>
              <option value="Sí">Sí</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn-sm btn-secondary"
          data-close="modal-registrar-pago"
        >
          Cancelar
        </button>
        <button type="submit" class="btn-sm btn-success">Guardar pago</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Detalle de pago -->
<div id="modal-detalle-pago" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3>Detalle del pago</h3>
      <button class="modal-close" data-close="modal-detalle-pago">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="pago-info-grid"></div>
    </div>
    <div class="modal-footer">
      <button
        type="button"
        class="btn-sm btn-secondary"
        data-close="modal-detalle-pago"
      >
        Cerrar
      </button>
    </div>
  </div>
</div>
