<section class="view active">
  <article class="table-card">
    <div class="view-header">
      <h3>Alumnos registrados</h3>
      <button id="btn-agregar-alumno" class="btn-sm btn-success">
        <i class="bi bi-person-plus-fill"></i> Agregar alumno
      </button>
    </div>

    <!-- Barra de filtros -->
    <div class="filtros-bar">
      <div class="filtro-group">
        <i class="bi bi-search"></i>
        <input
          id="filtro-alumno-texto"
          type="text"
          placeholder="Buscar por nombre, matrícula u oferta académica…"
        />
      </div>
      <select id="filtro-alumno-estatus">
        <option value="">— Todos los estatus —</option>
        <option value="Al corriente">Al corriente</option>
        <option value="Adeudo">Adeudo</option>
        <option value="Convenio">Convenio</option>
      </select>
      <button id="btn-limpiar-filtros-alumno" class="btn-sm btn-clear">
        <i class="bi bi-x-circle-fill"></i> Limpiar
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Matrícula</th>
          <th>Correo</th>
          <th>Oferta académica</th>
          <th>Estatus</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="alumnos-table"></tbody>
    </table>
    <div id="alumnos-pagination"></div>
  </article>
</section>

<!-- Modal: Editar alumno -->
<div id="modal-editar-alumno" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3>Editar alumno</h3>
      <button class="modal-close" data-close="modal-editar-alumno">✕</button>
    </div>
    <form id="form-editar-alumno">
      <div class="modal-body">
        <!-- Info de solo lectura -->
        <p
          id="edit-alumno-nombre"
          style="
            margin: 0 0 18px;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text);
          "
        ></p>
        <div class="form-grid">
          <div class="form-group">
            <label for="edit-estatus">Estatus</label>
            <select id="edit-estatus" required>
              <option value="Al corriente">Al corriente</option>
              <option value="Adeudo">Adeudo</option>
              <option value="Convenio">Convenio</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-saldo">Saldo actual ($)</label>
            <input
              id="edit-saldo"
              type="number"
              step="0.01"
              min="0"
              placeholder="0.00"
              required
            />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn-sm btn-secondary"
          data-close="modal-editar-alumno"
        >
          Cancelar
        </button>
        <button type="submit" class="btn-sm btn-primary">
          Guardar cambios
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Agregar alumno -->
<div id="modal-agregar-alumno" class="modal-overlay" style="display: none">
  <div class="modal">
    <div class="modal-header">
      <h3>Registrar nuevo alumno</h3>
      <button class="modal-close" data-close="modal-agregar-alumno">✕</button>
    </div>
    <form id="form-agregar-alumno">
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label for="a-nombre">Nombre(s)</label>
            <input
              id="a-nombre"
              type="text"
              required
              placeholder="Ej. Juan Carlos"
            />
          </div>
          <div class="form-group">
            <label for="a-ap">Apellido paterno</label>
            <input id="a-ap" type="text" required placeholder="Ej. García" />
          </div>
          <div class="form-group">
            <label for="a-am">Apellido materno</label>
            <input id="a-am" type="text" required placeholder="Ej. López" />
          </div>
          <div class="form-group">
            <label for="a-matricula">Matrícula</label>
            <input
              id="a-matricula"
              type="number"
              required
              placeholder="Ej. 20231001"
            />
          </div>
          <div class="form-group full-width">
            <label for="a-correo">Correo electrónico</label>
            <input
              id="a-correo"
              type="email"
              required
              placeholder="alumno@iprl.mx"
            />
          </div>
          <div class="form-group full-width">
            <label for="a-oferta">Oferta académica</label>
            <input
              id="a-oferta"
              type="text"
              required
              placeholder="Ej. Ingeniería en Sistemas"
            />
          </div>
          <div class="form-group">
            <label for="a-estatus">Estatus</label>
            <select id="a-estatus">
              <option value="Al corriente">Al corriente</option>
              <option value="Adeudo">Adeudo</option>
              <option value="Convenio">Convenio</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn-sm btn-secondary"
          data-close="modal-agregar-alumno"
        >
          Cancelar
        </button>
        <button type="submit" class="btn-sm btn-success">Guardar alumno</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Detalle de alumno -->
<div id="modal-detalle-alumno" class="modal-overlay" style="display: none">
  <div class="modal modal--wide">
    <div class="modal-header">
      <h3>Detalle del alumno</h3>
      <button class="modal-close" data-close="modal-detalle-alumno">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-grid" id="alumno-info-grid"></div>
      <div class="detail-section-title">Historial de pagos</div>
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Concepto</th>
            <th>Monto</th>
            <th>Método</th>
          </tr>
        </thead>
        <tbody id="alumno-pagos-tabla"></tbody>
      </table>
    </div>
    <div class="modal-footer">
      <button
        type="button"
        class="btn-sm btn-secondary"
        data-close="modal-detalle-alumno"
      >
        Cerrar
      </button>
    </div>
  </div>
</div>
